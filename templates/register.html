{% extends "base.html" %}

{% block title %}Register — MyStore{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Create Account</h1>

    <form action="/auth/register-form" method="post">
        <div class="mb-4">
            <label class="block text-gray-600 mb-2">Name</label>
            <input type="text" name="name"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:border-blue-500"
                   placeholder="Your name">
        </div>
        <div class="mb-4">
            <label class="block text-gray-600 mb-2">Email</label>
            <input type="email" name="email"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:border-blue-500"
                   placeholder="your@email.com">
        </div>
        <div class="mb-6">
            <label class="block text-gray-600 mb-2">Password</label>
            <input type="password" name="password"
                   class="w-full border rounded px-3 py-2 focus:outline-none focus:border-blue-500"
                   placeholder="••••••••">
        </div>
        <button type="submit"
                class="bg-blue-500 text-white w-full py-2 rounded hover:bg-blue-600">
            Create Account
        </button>
    </form>

    <p class="text-center text-gray-500 mt-4">
        Already have an account?
        <a href="/login" class="text-blue-500 hover:underline">Login</a>
    </p>
</div>
{% endblock %}
