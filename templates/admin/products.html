{% extends "base.html" %}

{% block title %}Admin - Products{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">All Products</h1>
        <a href="/admin" class="text-blue-500 hover:underline">← Dashboard</a>
    </div>

    <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full">
            <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Image</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Title</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Brand</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Price</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Stock</th>
            </tr>
            </thead>
            <tbody class="divide-y">
            {% for product in products %}
            <tr>
                <td class="px-6 py-4">
                    <img src="{{ product.images }}" alt="{{ product.title }}" class="w-12 h-12 object-contain">
                </td>
                <td class="px-6 py-4 font-semibold">{{ product.title }}</td>
                <td class="px-6 py-4 text-sm text-gray-500">{{ product.brand }}</td>
                <td class="px-6 py-4 font-bold">${{ product.price }}</td>
                <td class="px-6 py-4">{{ product.stock }}</td>
            </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
