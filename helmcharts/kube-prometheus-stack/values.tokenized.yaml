grafana:
  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true
  env:
    GF_SERVER_ROOT_URL: "https://argocd.rajasekharcloud.com/grafana/"
    #    GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
    GF_SERVER_SERVE_FROM_SUB_PATH: "true"
  grafana.ini:
    server:
      root_url: 'https://argocd.rajasekharcloud.com/grafana/'
      serve_from_sub_path: true
    angular_support_enabled: false
  #see the grafana values.yaml for more example /charts/grafana/
  persistence:
    type: pvc
    enabled: true
    storageClassName: gp2
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    finalizers:
      - kubernetes.io/pvc-protection
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /grafana/$2
      #      kubernetes.io/ingress.class: "nginx"
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/configuration-snippet: |
        proxy_set_header X-Scheme $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
    hosts:
      - argocd.rajasekharcloud.com
    path: /grafana(/|$)(.*)
    pathType: ImplementationSpecific
    tls:
      - secretName: grafana-tls-cert

prometheusOperator:
  resources:
    limits:
      cpu: 350m
      memory: 400Mi
    requests:
      cpu: 100m
      memory: 200Mi

prometheus:
  prometheusSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 15Gi
    additionalScrapeConfigs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [ __meta_kubernetes_pod_annotation_prometheus_io_scrape ]
            action: keep
            regex: true
          - source_labels: [ __meta_kubernetes_pod_annotation_prometheus_io_path ]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [ __address__, __meta_kubernetes_pod_annotation_prometheus_io_port ]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [ __meta_kubernetes_namespace ]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [ __meta_kubernetes_pod_name ]
            action: replace
            target_label: kubernetes_pod_name
          - source_labels: [ __meta_kubernetes_pod_ready ]
            action: replace
            target_label: pod_ready
          - source_labels: [ __meta_kubernetes_pod_phase ]
            action: replace
            target_label: pod_phase
          - source_labels: [ __meta_kubernetes_pod_node_name ]
            action: replace
            target_label: pod_node_name
          - source_labels: [ __meta_kubernetes_pod_host_ip ]
            action: replace
            target_label: pod_host_ip
          - source_labels:
              - __meta_kubernetes_pod_label_app_kubernetes_io_name
              - __meta_kubernetes_pod_label_app
              - __tmp_controller_name
              - __meta_kubernetes_pod_name
            regex: ^;*([^;]+)(;.*)?$
            action: replace
            target_label: app
          - source_labels:
              - __meta_kubernetes_pod_label_app_kubernetes_io_instance
              - __meta_kubernetes_pod_label_instance
            regex: ^;*([^;]+)(;.*)?$
            action: replace
            target_label: instance
          - source_labels:
              - __meta_kubernetes_node_name
            action: replace
            target_label: node
          - source_labels:
              - __meta_kubernetes_pod_label_profile
            action: replace
            target_label: profile
          - source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_service_name
            target_label: service
            action: replace
          - source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_ingress_name
            action: replace
            target_label: ingress
          - source_labels:
              - __meta_kubernetes_pod_label_app_kubernetes_io_component
              - __meta_kubernetes_pod_label_component
            regex: ^;*([^;]+)(;.*)?$
            action: replace
            target_label: component
          - source_labels: [ __meta_kubernetes_service_name ]
            action: replace
            target_label: kubernetes_name
          - source_labels: [ __meta_kubernetes_service_cluster_ip ]
            action: replace
            target_label: service_cluster_ip
          - source_labels: [ __meta_kubernetes_service_loadbalancer_ip ]
            action: replace
            target_label: service_loadbalancer_ip
          - source_labels: [ __meta_kubernetes_service_external_name ]
            action: replace
            target_label: service_external_name
          - action: labelmap
            regex: __meta_kubernetes_ingress_label_(.+)
          - source_labels: [ __meta_kubernetes_namespace ]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [ __meta_kubernetes_ingress_name ]
            action: replace
            target_label: kubernetes_name
          - source_labels: [ __meta_kubernetes_ingress_class_name ]
            action: replace
            target_label: ingress_class_name
          - source_labels: [ __meta_kubernetes_ingress_scheme ]
            action: replace
            target_label: ingress_scheme
          - source_labels: [ __meta_kubernetes_ingress_path ]
            action: replace
            target_label: ingress_path