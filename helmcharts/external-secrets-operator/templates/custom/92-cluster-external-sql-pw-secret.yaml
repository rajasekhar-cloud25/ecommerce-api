{{- if and .Values.azurekv.importSqlSecret .Values.azurekv.create }}
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: "ext-secret-ces-sql"
spec:
  # The name to be used on the ExternalSecrets
  externalSecretName: "ext-secret-sql"
  refreshTime: "1m"
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values:
          {{- range .Values.azurekv.namespaces }}
          - {{ . }}
          {{- end }}
  externalSecretSpec:
    refreshInterval: 15m           # rate ESO pulls Azure Key Vault
    secretStoreRef:
      kind: ClusterSecretStore
      name: {{ .Values.azurekv.storeName }}           # name of the SecretStore (or kind specified)
    target:
      name: ext-secret-sql           # name of the k8s Secret to be created
      creationPolicy: Owner
    dataFrom:
    # find all secrets with tags
    - find:
        tags:
          importsql: "true"
        name:
          regexp: "^DB"
{{- end }}
