image:
  repository: 008469331115.dkr.ecr.us-east-1.amazonaws.com/ecommerce-api
  tag: 2b9e87151ad29bab6a772822a515f017f1f6b3fe
  pullPolicy: Always

replicaCount: 1

aws:
  region: us-east-1
  eso_role_arn: "arn:aws:iam::CHANGE_ME:role/CHANGE_ME-external-secrets"

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  host: eks-demo.rajasekharcloud.com
  tls: true

app:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

postgres:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage: 5Gi

redis:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

opensearch:
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  storage: 5Gi

config:
  app_name: "Ecommerce Store"
  algorithm: "HS256"
  access_token_expire_minutes: "30"

  db_host: "postgres-postgres"
  db_port: "5432"
  db_name: "ecommerce_store"

  redis_host: "ecommerce-api-redis"
  redis_port: "6379"
  cache_enabled: "true"

  opensearch_enabled: "true"
  opensearch_host: "ecommerce-api-opensearch"
  opensearch_port: "9200"

  otel_enabled: "true"
  otel_service_name: "ecommerce-api-otel-collector"
  otel_exporter_otlp_endpoint: "http://ecommerce-api-otel-collector:4317"

  stripe_success_url: "https://eks-demo.rajasekharcloud.com/orders/stripe-success"
  stripe_cancel_url: "https://eks-demo.rajasekharcloud.com/cart?error=payment_cancelled"