apiVersion: v1
kind: Service
metadata:
    name: {{ .Release.Name }}-postgres
    labels:
        app: {{ .Release.Name }}
        component: postgres
spec:
    type: ClusterIP
    ports:
        - port: 5432
          targetPort: tcp-pg
          protocol: TCP
          name: tcp-pg
    selector:
        app: {{ .Release.Name }}
        component: postgres
---
apiVersion: v1
kind: Service
metadata:
    name: {{ .Release.Name }}-postgres-headless
    labels:
        app: {{ .Release.Name }}
        component: postgres
spec:
    type: ClusterIP
    clusterIP: None
    ports:
        - port: 5432
          targetPort: tcp-pg
          protocol: TCP
          name: tcp-pg
    selector:
        app: {{ .Release.Name }}
        component: postgres